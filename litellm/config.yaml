# LiteLLM proxy 配置（Agent架构设计.md 5.3）：代理层负责"接哪家模型"，
# 应用代码永远只认 OpenAI 兼容协议——换模型改这个文件，不改一行 TS。
model_list:
  - model_name: default
    litellm_params:
      model: deepseek/deepseek-v4-pro
      api_key: os.environ/DEEPSEEK_API_KEY

  # 检索生成用的低延迟模型（Phase2-开工计划.md 决策 F）：追溯问答走这个，
  # streamText 流式吐字，不用捕获那个 ~11s 的思考模型。换供应商只改这里。
  - model_name: fast
    litellm_params:
      model: deepseek/deepseek-v4-flash
      api_key: os.environ/DEEPSEEK_API_KEY

  # 语义索引用的 embedding 模型（Phase2-开工计划.md 决策 E 修订）：本地
  # bge-m3（1024 维），经宿主机上的 Ollama 提供，数据不出内网、零 API 费，
  # 贴合自部署/数据敏感定位（OQ3）。api_base 走 host.docker.internal——
  # LiteLLM 在容器里，127.0.0.1 是容器自己，得用这个别名回连宿主机 Ollama。
  # 换回云端 embedding 只改这里，但换维度须同步改 schema 与向量索引迁移。
  - model_name: embedding
    litellm_params:
      model: ollama/bge-m3
      api_base: http://host.docker.internal:11434

general_settings:
  master_key: os.environ/LITELLM_API_KEY
