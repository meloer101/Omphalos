# LiteLLM proxy 配置（Agent架构设计.md 5.3）：代理层负责"接哪家模型"，
# 应用代码永远只认 OpenAI 兼容协议——换模型改这个文件，不改一行 TS。
model_list:
  - model_name: default
    litellm_params:
      model: deepseek/deepseek-v4-pro
      api_key: os.environ/DEEPSEEK_API_KEY

  # 检索生成用的低延迟模型（Phase2-开工计划.md 决策 F）：追溯问答走这个，
  # streamText 流式吐字，不用捕获那个 ~11s 的思考模型。换供应商只改这里。
  - model_name: fast
    litellm_params:
      model: deepseek/deepseek-v4
      api_key: os.environ/DEEPSEEK_API_KEY

  # 语义索引用的 embedding 模型（Phase2-开工计划.md 决策 E）：OpenAI 兼容
  # 1536 维，匹配 db/schema.ts 的 nodes.embedding。换本地模型（如 bge-m3）
  # 只改这里，但换维度须同步改 schema 与向量索引迁移。
  - model_name: embedding
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY

general_settings:
  master_key: os.environ/LITELLM_API_KEY
