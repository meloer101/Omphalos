name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 54322:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres
      # 物理只读角色由迁移 0003 创建（下面 Apply migrations 步骤会跑到），
      # readonly-role.test.ts 和 P2 检索合同用它。密码与 db/migrations/
      # 0003_readonly_role.sql 里 CREATE ROLE 的字面量保持一致。
      DATABASE_URL_READONLY: postgresql://graph_readonly:graph_readonly_dev_only@localhost:54322/postgres
      # Phase 3 决策 J（拆库）：vitest 走独立测试库。CI 也镜像本地——
      # 建 pmeverything_test 并单独迁移，pnpm test 只碰它。
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:54322/pmeverything_test
      DATABASE_URL_READONLY_TEST: postgresql://graph_readonly:graph_readonly_dev_only@localhost:54322/pmeverything_test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # 建独立测试库（ubuntu-latest 预装 psql 客户端）。迁移 0007 会给
      # graph_readonly 授 CONNECT 到本库（决策 J）。
      - name: Create test database
        run: PGPASSWORD=postgres psql -h localhost -p 54322 -U postgres -d postgres -c 'CREATE DATABASE pmeverything_test'

      - name: Apply migrations (dev DB)
        run: pnpm db:migrate

      - name: Apply migrations (test DB)
        run: pnpm db:migrate:test

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
